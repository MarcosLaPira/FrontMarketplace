<div class="min-h-screen bg-gray-50">
  <app-navbar [displayName]="userProfile()?.nombre" [showExploreLink]="true" />

  <div class="max-w-7xl mx-auto px-4 py-8">
    <app-influencer-social-connect class="block mb-6" />

    <!-- Tabs con design system -->
    <div class="flex gap-1 mb-6 overflow-x-auto bg-white border border-gray-200 rounded-xl p-1 w-fit">
      @for (tab of tabs; track tab.id) {
        <button (click)="activeTab.set(tab.id)"
          class="flex items-center gap-2 px-4 py-2.5 rounded-lg font-semibold text-sm transition whitespace-nowrap"
          [class]="activeTab() === tab.id
            ? 'bg-indigo-600 text-white shadow-sm'
            : 'text-gray-500 hover:text-gray-700 hover:bg-gray-50'">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="tab.icon"/>
          </svg>
          {{ tab.label }}
        </button>
      }
    </div>

    @if (activeTab() === 'perfil') {
      <app-influencer-perfil [categorias]="categorias()" />
    }

    @if (activeTab() === 'estadisticas') {
      <app-influencer-estadisticas />
    }

    @if (activeTab() === 'costos') {
      <app-influencer-costos />
    }

    @if (activeTab() === 'campanas') {
      <app-influencer-campanas />
    }

    @if (activeTab() === 'postulaciones') {
      <app-influencer-postulaciones />
    }
  </div>
</div>
