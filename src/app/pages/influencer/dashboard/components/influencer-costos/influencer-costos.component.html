<div class="space-y-6">

  <!-- Header -->
  <div class="bg-gradient-to-r from-indigo-600 to-purple-600 rounded-2xl p-6 md:p-8 text-white">
    <div class="flex items-center gap-3 mb-2">
      <div class="bg-white/15 backdrop-blur-sm p-2 rounded-lg">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      </div>
      <div>
        <h2 class="text-2xl md:text-3xl font-bold">Mis Costos</h2>
        <p class="text-indigo-100 text-sm">Definí tus tarifas por plataforma para que las marcas conozcan tus precios</p>
      </div>
    </div>
  </div>

  <!-- Mensajes -->
  @if (successMsg()) {
    <div class="bg-green-50 border border-green-100 text-green-600 px-5 py-3 rounded-2xl text-sm font-medium flex items-center gap-2">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      {{ successMsg() }}
    </div>
  }
  @if (errorMsg()) {
    <div class="bg-red-50 border border-red-100 text-red-600 px-5 py-3 rounded-2xl text-sm font-medium flex items-center gap-2">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      {{ errorMsg() }}
    </div>
  }

  <!-- Formulario -->
  <div class="bg-white border border-gray-100 shadow-sm rounded-2xl overflow-hidden">
    <div class="border-b border-gray-100 px-5 py-4">
      <h3 class="text-sm font-bold text-gray-900 uppercase tracking-wide">Agregar / Actualizar costo</h3>
    </div>

    <form [formGroup]="costForm" (ngSubmit)="agregarCosto()" class="p-5 space-y-5">
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <!-- Plataforma -->
        <div>
          <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">Plataforma</label>
          <select formControlName="idPlataforma"
            class="w-full px-3 py-2.5 rounded-lg border border-gray-200 bg-gray-50 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition">
            <option value="">Seleccioná una plataforma</option>
            @for (p of plataformas(); track p.idPlataforma) {
              <option [value]="p.idPlataforma">{{ p.nombrePlataforma }}</option>
            }
          </select>
        </div>

        <!-- Costo Mínimo -->
        <div>
          <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">Costo Mínimo ($)</label>
          <input type="number" formControlName="costoMin" placeholder="Ej: 50000"
            class="w-full px-3 py-2.5 rounded-lg border border-gray-200 bg-gray-50 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition" />
        </div>

        <!-- Costo Máximo -->
        <div>
          <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">Costo Máximo ($)</label>
          <input type="number" formControlName="costoMax" placeholder="Ej: 150000"
            class="w-full px-3 py-2.5 rounded-lg border border-gray-200 bg-gray-50 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition" />
        </div>

        <!-- Canje -->
        <div class="flex items-end pb-1">
          <label class="flex items-center gap-2 cursor-pointer px-3 py-2.5 rounded-lg border border-gray-200 bg-gray-50 hover:bg-gray-100 transition w-full">
            <input type="checkbox" formControlName="canje"
              class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded" />
            <span class="text-sm text-gray-700 font-medium">Acepto canje</span>
          </label>
        </div>
      </div>

      <div class="flex justify-end pt-3 border-t border-gray-100">
        <button type="submit" [disabled]="saving()"
          class="px-5 py-2.5 bg-indigo-600 text-white text-sm font-semibold rounded-lg hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed transition flex items-center gap-2">
          @if (saving()) {
            <div class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
            Guardando...
          } @else {
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
            Guardar costo
          }
        </button>
      </div>
    </form>
  </div>
</div>
