<div class="min-h-screen bg-gray-50">
  <app-navbar [displayName]="marca()?.nombreComercial" />

  <div class="max-w-7xl mx-auto px-4 py-8">
    <!-- Tabs -->
    <div class="bg-white border border-gray-100 rounded-2xl shadow-sm p-1.5 inline-flex gap-1 mb-6">
      <button (click)="onTabChange('campanas')"
        class="flex items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-semibold transition-all duration-200"
        [class]="activeTab() === 'campanas'
          ? 'bg-gradient-to-r from-indigo-600 to-purple-600 text-white shadow-sm'
          : 'text-gray-500 hover:text-gray-700 hover:bg-gray-50'">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
        Campañas
      </button>
      <button (click)="onTabChange('mi-marca')"
        class="flex items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-semibold transition-all duration-200"
        [class]="activeTab() === 'mi-marca'
          ? 'bg-gradient-to-r from-indigo-600 to-purple-600 text-white shadow-sm'
          : 'text-gray-500 hover:text-gray-700 hover:bg-gray-50'">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
        Mi Marca
      </button>
      <button (click)="onTabChange('influencers')"
        class="flex items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-semibold transition-all duration-200"
        [class]="activeTab() === 'influencers'
          ? 'bg-gradient-to-r from-indigo-600 to-purple-600 text-white shadow-sm'
          : 'text-gray-500 hover:text-gray-700 hover:bg-gray-50'">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        Influencers
      </button>
    </div>

    @if (activeTab() === 'campanas') {
      <app-marca-campanas
        [categorias]="categorias()"
        [plataformas]="plataformas()"
        [tiposContenido]="tiposContenido()"
        [campanas]="misCampanas()"
        (invitarInfluencerClick)="irAInfluencers($event)" />
    }

    @if (activeTab() === 'mi-marca') {
      <app-marca-profile
        [marca]="marca()"
        [userProfile]="userProfile()"
        [categorias]="categorias()"
        (profileUpdated)="loadMarcaData()" />
    }

    @if (activeTab() === 'influencers') {
      <app-marca-influencers
        [categorias]="categorias()"
        [plataformas]="plataformas()"
        [misCampanas]="misCampanas()"
        [campanaIdParaInvitar]="campanaIdParaInvitar()" />
    }
  </div>
</div>
