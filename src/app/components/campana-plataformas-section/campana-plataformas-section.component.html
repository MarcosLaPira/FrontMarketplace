<div class="px-4 pb-4 pt-3 space-y-4 border-t border-gray-100">

  <!-- Selección única de contenido -->
  <div class="bg-gray-50 border border-gray-200 rounded-xl p-4 space-y-3">
    <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Seleccioná plataforma y tipo de contenido</p>
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
      <div>
        <label class="text-xs text-gray-500 mb-1 block">Plataforma</label>
        <select [value]="seleccion().idPlataforma" (change)="setField('idPlataforma', $any($event.target).value)"
          class="w-full px-3 py-2.5 rounded-lg border border-gray-200 bg-white text-sm focus:ring-2 focus:ring-indigo-500 transition">
          <option value="">Seleccioná</option>
          @for (p of plataformas(); track p.idPlataforma) {
            <option [value]="p.idPlataforma">{{ p.nombrePlataforma }}</option>
          }
        </select>
      </div>
      <div>
        <label class="text-xs text-gray-500 mb-1 block">Tipo de contenido</label>
        <select [value]="seleccion().idTipoContenido" (change)="setField('idTipoContenido', $any($event.target).value)"
          class="w-full px-3 py-2.5 rounded-lg border border-gray-200 bg-white text-sm focus:ring-2 focus:ring-indigo-500 transition">
          <option value="">Seleccioná</option>
          @for (t of tiposContenido(); track t.idTipoContenido) {
            <option [value]="t.idTipoContenido">{{ t.nombre }}</option>
          }
        </select>
      </div>
    </div>
    <p class="text-[11px] text-gray-400">Selección única por ahora. Más adelante habilitamos múltiples formatos.</p>
  </div>

  @if (items().length > 0) {
    <div class="rounded-xl border border-indigo-200 bg-indigo-50/50 p-3 flex items-center justify-between gap-2">
      <div class="text-sm text-indigo-800">
        <span class="font-semibold">{{ getNombrePlataforma(items()[0].idPlataforma) }}</span>
        <span class="text-indigo-400 mx-1">·</span>
        <span>{{ getNombreTipoContenido(items()[0].idTipoContenido) }}</span>
      </div>
      <button type="button" (click)="limpiar()"
        class="w-7 h-7 flex items-center justify-center rounded-lg text-indigo-500 hover:bg-white hover:text-red-600 transition">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
  }

</div>
