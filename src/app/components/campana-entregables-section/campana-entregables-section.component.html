<div class="px-4 pb-4 pt-3 space-y-3 border-t border-gray-100">
  <div class="bg-gray-50 border border-gray-200 rounded-xl p-4 space-y-3">
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
      <div>
        <label class="text-xs text-gray-500 mb-1 block">Descripción</label>
        <input type="text"
          [value]="nuevoEntregable().descripcion"
          (input)="setField('descripcion', $any($event.target).value)"
          placeholder="Ej: Publicar un reel con el producto"
          class="w-full px-3 py-2.5 rounded-lg border border-gray-200 bg-white text-sm focus:ring-2 focus:ring-indigo-500 transition" />
      </div>
      <div>
        <label class="text-xs text-gray-500 mb-1 block">Fecha límite</label>
        <input type="date"
          [value]="nuevoEntregable().fechaLimite"
          (change)="setField('fechaLimite', $any($event.target).value)"
          class="w-full px-3 py-2.5 rounded-lg border border-gray-200 bg-white text-sm focus:ring-2 focus:ring-indigo-500 transition" />
      </div>
    </div>
    @if (!hasEntregable) {
      <div class="flex justify-end">
        <button type="button" (click)="agregar()" [disabled]="!canAgregar"
          class="flex items-center gap-2 px-4 py-2 text-sm font-semibold rounded-lg transition disabled:opacity-40 disabled:cursor-not-allowed bg-indigo-600 text-white hover:bg-indigo-700">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          Guardar entregable
        </button>
      </div>
    } @else {
      <p class="text-xs text-gray-400">Solo se permite un entregable por campaña en esta versión.</p>
    }
  </div>

  @if (items().length > 0) {
    <div class="space-y-2">
      @for (e of items(); let i = $index; track i) {
        <div class="flex items-center gap-3 px-4 py-3 rounded-xl border border-gray-200 bg-white">
          <span class="flex-shrink-0 w-6 h-6 rounded-full bg-indigo-50 text-indigo-700 text-xs font-bold flex items-center justify-center">{{ e.orden }}</span>
          <div class="flex-1 min-w-0">
            <p class="text-sm font-medium text-gray-900 truncate">{{ e.descripcion }}</p>
            <p class="text-xs text-gray-400 flex items-center gap-1 mt-0.5">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
              Límite: {{ e.fechaLimite | date:'dd/MM/yyyy' }}
            </p>
          </div>
          <button type="button" (click)="eliminar(i)"
            class="w-7 h-7 flex items-center justify-center rounded-lg text-gray-400 hover:bg-red-50 hover:text-red-600 transition">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>
      }
    </div>
  }
</div>
