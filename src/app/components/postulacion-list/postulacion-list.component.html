<div class="mt-3 pt-3 border-t bg-gray-50 rounded p-4">
  @if (!compact()) {
    <h4 class="font-semibold mb-3">Postulantes</h4>
  }

  @for (post of postulaciones(); track post.idPostulacion) {
    <app-postulacion-item
      [postulacion]="post"
      [compact]="compact()"
      [showActions]="showActions()"
      (accepted)="accepted.emit($event)"
      (rejected)="rejected.emit($event)" />
  } @empty {
    <p class="text-gray-500 text-sm">
      @if (compact()) { No hubo postulantes } @else { No hay postulantes para esta campaña }
    </p>
  }
</div>
